<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery — Deniyaya Beverly Villa</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
      margin-top: 4rem;
    }
    .gallery-item {
      position: relative;
      border-radius: 15px;
      overflow: hidden;
      aspect-ratio: 4/3;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: var(--transition);
    }
    .gallery-item:hover { transform: scale(1.03); }
    .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
    .gallery-overlay {
      position: absolute;
      inset: 0;
      background: rgba(26,58,52,0.4);
      opacity: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }
    .gallery-item:hover .gallery-overlay { opacity: 1; }
    
    /* Lightbox */
    #lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: none;
      z-index: 2000;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    #lightbox.open { display: flex; }
    #lightbox-img { max-width: 100%; max-height: 100%; border-radius: 10px; }
    .close-lightbox {
      position: absolute;
      top: 2rem;
      right: 2rem;
      color: white;
      font-size: 2rem;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- NAVIGATION -->
  <nav class="navbar scrolled">
    <div class="container nav-content">
    <div class="container nav-content">
      <a href="index.html" class="logo"><span>Beverly Villa</span></a>
      <div class="hamburger">
        <span></span><span></span><span></span>
      </div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="rooms.html">Rooms</a></li>
        <li><a href="experiences.html">Experiences</a></li>
        <li><a href="gallery.html" class="active">Gallery</a></li>
        <li><a href="contact.html" class="nav-cta">Book Now</a></li>
      </ul>
    </div>
  </nav>

  <header class="inner-hero" style="background: linear-gradient(rgba(26,58,52,0.6), rgba(26,58,52,0.8)), url('assets/hero.png'); height: 40vh; display: flex; align-items: center; justify-content: center; color: white;">
    <div class="container" style="text-align: center;">
      <h1>Visual Journey</h1>
      <p style="text-transform: uppercase; letter-spacing: 0.3em; margin-top: 1rem;">Moments at Beverly Villa</p>
    </div>
  </header>

  <section class="section">
    <div class="container">
      <div class="gallery-grid">
        <div class="gallery-item reveal" style="transition-delay: 0.1s" onclick="openLightbox('assets/hero.png')">
          <img src="assets/hero.png" alt="Villa View">
          <div class="gallery-overlay">🔍 View</div>
        </div>
        <div class="gallery-item reveal" style="transition-delay: 0.2s" onclick="openLightbox('assets/room.png')">
          <img src="assets/room.png" alt="Luxury Room">
          <div class="gallery-overlay">🔍 View</div>
        </div>
        <div class="gallery-item reveal" style="transition-delay: 0.3s" onclick="openLightbox('assets/tea.png')">
          <img src="assets/tea.png" alt="Tea Estate">
          <div class="gallery-overlay">🔍 View</div>
        </div>
        <div class="gallery-item reveal" style="transition-delay: 0.4s" onclick="openLightbox('assets/nature.png')">
          <img src="assets/nature.png" alt="Nature">
          <div class="gallery-overlay">🔍 View</div>
        </div>
        <div class="gallery-item reveal" style="transition-delay: 0.5s" onclick="openLightbox('assets/tea.png')">
          <img src="assets/tea.png" alt="Misty Hills" style="filter: brightness(0.9) contrast(1.1);">
          <div class="gallery-overlay">🔍 View</div>
        </div>
        <div class="gallery-item reveal" style="transition-delay: 0.6s" onclick="openLightbox('assets/nature.png')">
          <img src="assets/nature.png" alt="Sinharaja" style="filter: saturate(1.5);">
          <div class="gallery-overlay">🔍 View</div>
        </div>
      </div>
    </div>
  </section>

  <div id="lightbox" onclick="closeLightbox()">
    <span class="close-lightbox">&times;</span>
    <img id="lightbox-img" src="" alt="Gallery Image">
  </div>

  <!-- FOOTER -->
  <footer>
    <div class="container">
      <div class="footer-grid">
        <div class="footer-info">
          <div class="footer-logo">Beverly Villa</div>
          <p style="opacity: 0.7; font-size: 0.9rem;">Deniyaya's premier rainforest retreat.</p>
        </div>
      </div>
      <div class="footer-bottom">
        &copy; 2026 Deniyaya Beverly Villa.
      </div>
    </div>
  </footer>

  <div class="floating-btns">
    <a href="https://wa.me/94775933695" class="float-btn float-whatsapp" title="Chat on WhatsApp">💬</a>
    <div class="float-btn float-top" id="scrollTop" title="Back to Top">↑</div>
  </div>

  <script>
    function openLightbox(src) {
      const lb = document.getElementById('lightbox');
      document.getElementById('lightbox-img').src = src;
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
  </script>
  <script src="script.js"></script>
</body>
</html>
